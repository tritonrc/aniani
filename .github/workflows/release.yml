name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: aniani-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: aniani-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: aniani-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz aniani
          cd ../../..
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/aniani.exe -DestinationPath ${{ matrix.artifact }}.zip
          $hash = (Get-FileHash -Algorithm SHA256 ${{ matrix.artifact }}.zip).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: ignore
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Aniani ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz \
            artifacts/*.zip \
            artifacts/*.sha256

      - name: Bump Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is empty or unset — the Homebrew formula was NOT bumped for ${GITHUB_REF_NAME}. Set a valid PAT with write access to tritonrc/homebrew-tap, then re-run this job or bump the formula manually." >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          mac_sha=$(awk '{print $1}' artifacts/aniani-macos-arm64.tar.gz.sha256)
          linux_sha=$(awk '{print $1}' artifacts/aniani-linux-x86_64.tar.gz.sha256)
          if [ -z "$mac_sha" ] || [ -z "$linux_sha" ]; then
            echo "missing checksums; aborting formula bump" >&2
            exit 1
          fi
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/tritonrc/homebrew-tap.git" tap
          # Patch version, release URLs, and the per-platform sha256 values in
          # place, preserving the formula's formatting. The macOS sha256 follows
          # the macos-arm64 URL; the Linux sha256 follows the linux-x86_64 URL.
          awk -v ver="$version" -v macsha="$mac_sha" -v linuxsha="$linux_sha" '
            /version "/ { sub(/"[^"]*"/, "\"" ver "\"") }
            /releases\/download\/v/ { gsub(/v[0-9]+\.[0-9]+\.[0-9]+/, "v" ver) }
            /aniani-macos-arm64\.tar\.gz/ { which = "mac" }
            /aniani-linux-x86_64\.tar\.gz/ { which = "linux" }
            /sha256 "/ {
              if (which == "mac") { sub(/"[^"]*"/, "\"" macsha "\""); which = "" }
              else if (which == "linux") { sub(/"[^"]*"/, "\"" linuxsha "\""); which = "" }
            }
            { print }
          ' tap/Formula/aniani.rb > tap/Formula/aniani.rb.new
          mv tap/Formula/aniani.rb.new tap/Formula/aniani.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/aniani.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
          else
            git commit -m "aniani ${version}"
            git push
          fi
